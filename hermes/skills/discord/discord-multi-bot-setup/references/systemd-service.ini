[Unit]
Description=Hermes Discord Multi-Bot Service
After=network-online.target
Wants=network-online.target

[Service]
Type=simple
ExecStart=/home/zeke/.hermes/hermes-agent/venv/bin/python3 \
  /home/zeke/.hermes/discord-bots/launcher.py
WorkingDirectory=/home/zeke/.hermes/discord-bots
Restart=on-failure
RestartSec=5s
KillMode=mixed
User=zeke

[Install]
WantedBy=default.target
